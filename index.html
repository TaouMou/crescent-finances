<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#14776b" />
    <link rel="icon" href="%BASE_URL%icons/icon-192.png" />
    <title>Crescent Finances</title>
    <script>
      // Apply persisted theme before paint to avoid a flash.
      try {
        const t = localStorage.getItem('crescent.theme');
        const dark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
