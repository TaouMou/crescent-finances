name: Cleanup old deployments

on:
  workflow_dispatch:

permissions:
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all but latest deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            console.log(`Found ${deployments.length} deployments`);

            // Keep the most recent one, delete the rest
            const toDelete = deployments.slice(1);

            for (const d of toDelete) {
              // Must mark inactive before deletion
              try {
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: d.id,
                  state: 'inactive'
                });
              } catch (_) {}

              try {
                await github.rest.repos.deleteDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: d.id
                });
                console.log(`Deleted deployment ${d.id} (${d.environment} @ ${d.created_at})`);
              } catch (e) {
                console.log(`Could not delete ${d.id}: ${e.message}`);
              }
            }

            console.log('Done.');
