name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (subpath for Pages)
        run: npm run build
        env:
          BASE_PATH: /crescent-finances/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Prune old deployments
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            // Keep the 2 most recent, delete the rest
            for (const d of deployments.slice(2)) {
              try {
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner, repo: context.repo.repo,
                  deployment_id: d.id, state: 'inactive'
                });
                await github.rest.repos.deleteDeployment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  deployment_id: d.id
                });
              } catch (_) {}
            }
